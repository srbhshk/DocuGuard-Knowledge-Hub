services:
  backend:
    image: docuguard/backend:latest
    environment:
      - DATABASE_URL=postgresql://docuguard:docuguard@postgres:5432/docuguard
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_HOST=http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant
      - ollama

  frontend:
    image: docuguard/frontend:latest
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=docuguard
      - POSTGRES_PASSWORD=docuguard
      - POSTGRES_DB=docuguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
